name: Rotate Banner GIF

on:
  schedule:
    # Runs daily at 06:00 UTC. Adjust as you like.
    - cron: "0 6 * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pick a random banner and update README files
        run: node scripts/rotate-banner.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md README.fr.md
          git diff --staged --quiet || git commit -m "chore: rotate banner gif [skip ci]"
          git push
